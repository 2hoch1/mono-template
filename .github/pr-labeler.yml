api changes:
  - changed-files:
      - any-glob-to-any-file:
          - packages/*/src/**
          - packages/*/src/*
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - packages/*/package.json
          - pnpm-lock.yaml
          - pnpm-workspace.yaml
tests:
  - changed-files:
      - any-glob-to-any-file:
          - packages/*/tests/*
          - packages/*/tests/**/*
docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/*
          - docs/**/*
          - '**/*.md'
infra:
  - changed-files:
      - any-glob-to-any-file:
          - .github/*
          - .github/**/*
ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/*
          - .github/workflows/**/*
typings:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.d.ts'
          - packages/*/src/**/*.ts
build:
  - changed-files:
      - any-glob-to-any-file:
          - tsconfig*.json
          - packages/*/tsconfig*.json
          - eslint.config.js
          - .prettierrc
          - .prettierignore
          - .editorconfig
          - .gitignore
          - .gitattributes
          - .commitlintrc.cjs
chore:
  - changed-files:
      - any-glob-to-any-file:
          - .npmignore
          - LICENSE
          - .github/CODE_OF_CONDUCT.md
          - .github/ISSUE_TEMPLATE/*
          - .github/ISSUE_TEMPLATE/**/*

'packages:core':
  - changed-files:
      - any-glob-to-any-file:
          - packages/core/**
